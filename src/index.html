<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/images/favicon.png">
</head>
<body>
  <!-- Netlify: form definitions are parsed from deploy HTML; keep field names in sync with app-contact. -->
  <form name="portfolio-contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="message"></textarea>
    <input type="checkbox" name="agree" />
  </form>
  <app-root></app-root>
</body>
</html>
