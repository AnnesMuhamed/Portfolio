<section class="skill-section" id="skills">
    <h1>{{ 'skills.title' | translate }}</h1>
    <div class="skill-contents">
        <div class="skills">

            <div class="skill-item">
                <img class="icons" src="/images/angular-logo.png" alt="Angular">
                <span>Angular</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/ts-logo.png" alt="TypeScript">
                <span>TypeScript</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/js-logo.png" alt="JavaScript">
                <span>JavaScript</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/html-logo.png" alt="HTML">
                <span>HTML</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/css-logo.png" alt="CSS">
                <span>CSS</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/api-logo.png" alt="REST-API">
                <span>REST.API</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/firebase-logo.png" alt="Firebase">
                <span>Firebase</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/git-logo.png" alt="Git">
                <span>Git</span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/material-logo.png" alt="Material-Design">
                <span [innerHTML]="'skills.materialDesign' | translate"></span>
            </div>

            <div class="skill-item">
                <img class="icons" src="/images/scrum-logo.png" alt="Scrum">
                <span>Scrum</span>
            </div>
        </div>
                <div class="currently-learning-img-wrapper">
                    <img src="/images/ellipse25.png" class="base-img" alt="Ellipse">
                    <img src="/images/property-1hover.png" class="hover-img" alt="Hover Ellipse">
                    <div class="learning-skills">
                        <span class="learning-skills-span">{{ 'skills.learning' | translate }}</span>
                        <div class="learning-contents">
                            <div class="learning-icons-container">
                                <div class="learning-icons">
                                    <img class="learning-icon" src="/images/react-logo.png" alt="React">
                                    <span class="skill-name">React</span>
                                </div>
                                <div class="learning-icons">
                                    <img class="learning-icon" src="/images/vue.js-logo.png" alt="Vue.js">
                                    <span class="skill-name">Vue.js</span>
                                </div>
                            </div>
                            <div class="learning-motivation-container">
                                <span class="learning-motivation">{{ 'skills.motivation' | translate }}</span>
                            </div>
                        </div>
                    </div>
                </div>
    </div>
</section>
