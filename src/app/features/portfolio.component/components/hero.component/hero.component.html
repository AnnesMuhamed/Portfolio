<section class="hero">

      <img src="/images/logo-icon.png" alt="Hero Icon">
      <span class="a-name">A.Muhamed</span>
      <span class="developer">developer</span>
    </div>
    <button class="burger-button" type="button" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="mobile-nav" [class.open]="menuOpen">
      <a href="#why-me" (click)="scrollTo('why-me', $event)">Why me</a>
