<section class="hero" id="hero">
  <div class="mobile-topbar">
    <div class="logo-container mobile-logo">
      <img src="/images/logo-icon.png" alt="Hero Icon">
      <span class="a-name">A.Muhamed</span>
      <span class="developer">{{ 'brand.developer' | translate }}</span>
    </div>
    <button
      class="burger-button"
      type="button"
      [class.burger-button--open]="menuOpen"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      [attr.aria-label]="'aria.toggleNav' | translate">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div
    class="mobile-menu"
    [class.mobile-menu--open]="menuOpen"
    [attr.aria-hidden]="!menuOpen"
    (click)="onMobileMenuBackdropClick($event)">
    <div class="mobile-menu__circle" (click)="$event.stopPropagation()">
      <nav class="mobile-menu__nav" aria-label="Navigation">
        <a href="#why-me" (click)="scrollTo('why-me', $event)">{{ 'nav.whyMe' | translate }}</a>
        <a href="#skills" (click)="scrollTo('skills', $event)">{{ 'nav.skills' | translate }}</a>
        <a href="#projects" (click)="scrollTo('projects', $event)">{{ 'nav.projects' | translate }}</a>
        <a href="#contact" (click)="scrollTo('contact', $event)">{{ 'nav.contact' | translate }}</a>
      </nav>
      <div class="mobile-menu__lang">
        <button
          type="button"
          class="mobile-menu__lang-btn"
          [class.mobile-menu__lang-btn--active]="currentLang === 'de'"
          (click)="selectLanguage('de', $event)">
          DE
        </button>
        <button
          type="button"
          class="mobile-menu__lang-btn"
          [class.mobile-menu__lang-btn--active]="currentLang === 'en'"
          (click)="selectLanguage('en', $event)">
          EN
        </button>
      </div>
    </div>
  </div>

  <div class="hero-content">
    <div class="hero-img">
      <div class="hero-visual">
        <div class="hero-shape-stack" aria-hidden="true">
          <img class="hero-shape-base" src="/images/bg-shape.png" alt="">
          <img class="hero-shape-hover" src="/images/shape-hover.png" alt="">
        </div>
        <div class="hero-profil">
          <img class="profil-picture" src="/images/profilbild.png" alt="">
        </div>
      </div>
    </div>

    <div class="hero-aside-row">
      <div class="hero-aside hero-name">
        <div class="hero-brand-row">
          <div class="logo-container">
          <img src="/images/logo-icon.png" alt="Hero Icon">
          <span class="a-name">A.Muhamed</span>
          <span class="developer">{{ 'brand.developer' | translate }}</span>
          </div>
        </div>
        <div class="name-container">
          <span class="fullname">Annes Muhamed</span>
          <span class="f-developer">{{ 'hero.role' | translate }}</span>
        </div>
        <button class="arrow-button" type="button" (click)="scrollTo('contact', $event)" aria-label="Scroll to contact section">
          <img src="/images/arrow-down.png" alt="">
        </button>
      </div>

      <div class="socialmedia">
        <a
          href="mailto:contact@annes-portfolio.de"
          class="icon-btn"
          aria-label="E-Mail an contact@annes-portfolio.de">
          <img class="icon-default" src="/images/email-button.svg" alt="">
          <img class="icon-hover" src="/images/email-button-hover.svg" alt="">
        </a>

        <a
          href="https://github.com/AnnesMuhamed"
          class="icon-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub">
          <img class="icon-default" src="/images/github-button.svg" alt="">
          <img class="icon-hover" src="/images/github-buttom-hover.svg" alt="">
        </a>

        <a
          href="https://www.linkedin.com/in/annes-muhamed-637642233"
          class="icon-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn">
          <img class="icon-default" src="/images/linkedin-button.svg" alt="">
          <img class="icon-hover" src="/images/linkedin-button-hover.svg" alt="">
        </a>
      </div>
    </div>
  </div>

</section>
