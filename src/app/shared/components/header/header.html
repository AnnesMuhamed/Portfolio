<section class="header">
    <div class="logo-container">
      <img src="/images/logo-dark.png" alt="">
      <span class="a-name">A.Muhamed</span>
      <span class="developer">{{ 'brand.developer' | translate }}</span>
    </div>
    <button
      class="burger-button"
      type="button"
      [class.burger-button--open]="menuOpen"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      [attr.aria-label]="'aria.toggleNav' | translate">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="header__nav-desktop" aria-label="Navigation">
        <a href="#why-me" (click)="scrollTo('why-me', $event)" [class.active-link]="activeSection === 'why-me'">{{ 'nav.whyMe' | translate }}</a>
        <a href="#skills" (click)="scrollTo('skills', $event)" [class.active-link]="activeSection === 'skills'">{{ 'nav.skills' | translate }}</a>
        <a href="#projects" (click)="scrollTo('projects', $event)" [class.active-link]="activeSection === 'projects'">{{ 'nav.projects' | translate }}</a>
        <a href="#contact" (click)="scrollTo('contact', $event)" [class.active-link]="activeSection === 'contact'">{{ 'nav.contact' | translate }}</a>
    </nav>
    <div class="language-switcher header__lang-desktop">
        <button type="button" class="lang-btn" [class.active]="currentLang === 'de'" (click)="selectLanguage('de', $event)">DE</button>
        <button type="button" class="lang-btn" [class.active]="currentLang === 'en'" (click)="selectLanguage('en', $event)">EN</button>
    </div>

    <div
      class="mobile-menu"
      [class.mobile-menu--open]="menuOpen"
      [attr.aria-hidden]="!menuOpen"
      (click)="onMobileMenuBackdropClick($event)">
      <div class="mobile-menu__circle" (click)="$event.stopPropagation()">
        <nav class="mobile-menu__nav" aria-label="Navigation">
          <a href="#why-me" (click)="scrollTo('why-me', $event)">{{ 'nav.whyMe' | translate }}</a>
          <a href="#skills" (click)="scrollTo('skills', $event)">{{ 'nav.skills' | translate }}</a>
          <a href="#projects" (click)="scrollTo('projects', $event)">{{ 'nav.projects' | translate }}</a>
          <a href="#contact" (click)="scrollTo('contact', $event)">{{ 'nav.contact' | translate }}</a>
        </nav>
        <div class="mobile-menu__lang">
          <button
            type="button"
            class="mobile-menu__lang-btn"
            [class.mobile-menu__lang-btn--active]="currentLang === 'de'"
            (click)="selectLanguage('de', $event)">
            DE
          </button>
          <button
            type="button"
            class="mobile-menu__lang-btn"
            [class.mobile-menu__lang-btn--active]="currentLang === 'en'"
            (click)="selectLanguage('en', $event)">
            EN
          </button>
        </div>
      </div>
    </div>
</section>
